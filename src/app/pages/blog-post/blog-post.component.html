<div class="responsive-container space-y-4 mt-10" *ngIf="post$ | async as route">
  <div class="flex flex-col md:flex-row">
    <app-breadcrumb></app-breadcrumb>
    <span class="flex-grow md:text-right text-sm">{{
      route.updatedAt | date: 'MMMM dd, yyyy'
    }}</span>
  </div>
  <div class="flex flex-col space-y-4">
    <a #link class="flex flex-col space-y-4 featured" [routerLink]="[route.route]">
      <h2 class="space-x-4 text-4xl font-bold line-clamp-2 min leading-normal">
        <span>{{ route.title }}</span>
      </h2>

      <div class="text-xl text-color-light description line-clamp-2 leading-6">
        {{ route.description }}
      </div>
    </a>

    <div class="line"></div>
    <div class="max-w-screen-xl flex flex-col-reverse mt-10 md:flex-row md:space-x-5">
      <div class="w-full flex flex-col text-justify space-y-4 md:w-9/12 xl:w-10/12 post">
        <scully-content></scully-content>
      </div>
      <div class="top-32 w-full flex flex-col mt-5 md:w-3/12 xl:w-2/12 md:mt-0">
        <div class="sticky top-32 space-y-4">
          <niz-toc></niz-toc>
          <div>
            <h2 class="text-xl font-semibold">Categorías</h2>
            <niz-chip
              class="mb-1 mr-1 gradient"
              *ngFor="let tag of route.tags | slice: 0:3"
              size="xl"
            >
              <a [routerLink]="'/tags/' + (tag | dash | lowercase)">
                {{ tag }}
              </a>
            </niz-chip>
          </div>
        </div>
      </div>
    </div>
  </div>

  <app-comments class="my-5" [route]="post$ | async"></app-comments>
</div>
