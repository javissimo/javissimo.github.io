<ul class="">
  <h2 class="text-xl font-semibold">Table of Contents</h2>
  <li
    [ngClass]="
      themeService.theme === 'dark' ? 'cursor-pointer' : 'cursor-pointer-dark'
    "
  >
    <a
      [class]="headerClasses('h3')"
      *ngIf="(content.getCurrent() | async)?.route as route"
      (click)="scrollToTop(route)"
    >
      Top of Page
    </a>
  </li>
  <li
    *ngFor="let header of headers$ | async"
    [ngClass]="
      themeService.theme === 'dark'
        ? 'hover:text-primary'
        : 'hover:text-secondary'
    "
    class="cursor-pointer"
  >
    <a
      [ngClass]="[headerClasses(header.localName), active(route, header.id)]"
      *ngIf="(content.getCurrent() | async)?.route as route"
      (click)="scrollTo(route, header.id)"
    >
      {{ header.innerHTML }}
    </a>
  </li>
  <li
    [ngClass]="
      themeService.theme === 'dark'
        ? 'hover:text-primary'
        : 'hover:text-secondary'
    "
    class="cursor-pointer"
  >
    <a [class]="headerClasses('h3')" (click)="scrollToRelated()">
      Related Articles
    </a>
  </li>
</ul>
